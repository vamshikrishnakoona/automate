name: Power Platform Environment Provisioning

on:
  workflow_dispatch:
    inputs:
      environmentFilter:
        description: 'Optional: only provision the environment with this "name" from environments.json (leave blank for all)'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'config/environments.json'
      - 'scripts/**'
      - '.github/workflows/power-platform-environment-provision.yml'

permissions:
  contents: read

jobs:
  provision:
    runs-on: windows-latest # Microsoft.PowerApps.Administration.PowerShell installs cleanly here; ubuntu-latest + pwsh also works
    environment: production # optional: gate this behind a GitHub Environment with required reviewers

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Power Platform PowerShell module
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Microsoft.PowerApps.Administration.PowerShell -Scope CurrentUser -Force -AllowClobber

      - name: Run provisioning pipeline
        shell: pwsh
        env:
          PP_TENANT_ID: ${{ secrets.PP_TENANT_ID }}
          PP_APPLICATION_ID: ${{ secrets.PP_APPLICATION_ID }}
          PP_CLIENT_SECRET: ${{ secrets.PP_CLIENT_SECRET }}
        run: |
          ./scripts/Deploy-PowerPlatformEnvironment.ps1 `
            -TenantId $env:PP_TENANT_ID `
            -ApplicationId $env:PP_APPLICATION_ID `
            -ClientSecret $env:PP_CLIENT_SECRET `
            -EnvironmentFilter '${{ github.event.inputs.environmentFilter }}'
