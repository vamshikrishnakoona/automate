name: Power Platform Environment Automation

on:
  workflow_dispatch:
    inputs:
      environmentName:
        description: "Power Platform Environment Name"
        required: true
        type: string

      locationName:
        description: "Location"
        required: true
        default: "india"
        type: string

      environmentSku:
        description: "Environment Type"
        required: true
        default: "Sandbox"
        type: choice
        options:
          - Production
          - Sandbox

      environmentGroupName:
        description: "Environment Group Name"
        required: true
        default: "Managed-Environments"
        type: string

      securityGroupId:
        description: "Existing Security Group Object ID"
        required: true
        type: string

jobs:
  create-environment:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Execute Power Platform Provisioning Script
        shell: pwsh
        env:
          PP_TENANT_ID: ${{ secrets.PP_TENANT_ID }}
          PP_CLIENT_ID: ${{ secrets.PP_CLIENT_ID }}
          PP_CLIENT_SECRET: ${{ secrets.PP_CLIENT_SECRET }}

        run: |
          ./scripts/Provision-PowerPlatformEnvironment.ps1 `
            -TenantId $env:PP_TENANT_ID `
            -ClientId $env:PP_CLIENT_ID `
            -ClientSecret $env:PP_CLIENT_SECRET `
            -EnvironmentDisplayName "${{ inputs.environmentName }}" `
            -LocationName "${{ inputs.locationName }}" `
            -EnvironmentSku "${{ inputs.environmentSku }}" `
            -CurrencyName "INR" `
            -LanguageName "English" `
            -EnvironmentGroupName "${{ inputs.environmentGroupName }}" `
            -SecurityGroupId "${{ inputs.securityGroupId }}"
